<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Your account · Should I Boat?</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#004777" />
  <link rel="icon" type="image/png" href="/icon-256.png" />
  <link rel="apple-touch-icon" href="/icon-256.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet" />
  <script>
    // Set the theme before first paint to avoid a flash. Defaults to dark.
    (function () {
      try {
        var c = localStorage.getItem("theme") || "dark";
        var eff = c === "system"
          ? (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
          : c;
        document.documentElement.setAttribute("data-theme", eff);
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/account-entry.jsx"></script>
</body>
</html>
