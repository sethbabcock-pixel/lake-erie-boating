<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lake Erie — Should I Boat?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230a193f'/><text x='32' y='46' text-anchor='middle' font-size='38'>⛵</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary:#0a0f1f; --bg-card:#131a30; --text-primary:#e8eefc; --text-secondary:#c7d0e4;
      --text-muted:#8aa3c0; --border:#243049; --accent:#00A0E2; }
    * { box-sizing: border-box; }
    body { background: var(--bg-primary); color: var(--text-primary);
      font-family: 'DM Sans', system-ui, sans-serif; margin: 0; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 64px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .topbar h1 { font-size: 20px; margin: 0; display: flex; align-items: center; gap: 8px; }
    .topbar .live { font-size: 11px; color: #34d399; display: flex; align-items: center; gap: 5px; }
    .topbar .live::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: #34d399; }

    .spots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .spots button { padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
      background: var(--bg-card); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 999px; }
    .spots button.active { background: var(--accent); color: #04121f; border-color: transparent; }

    .verdict { border-radius: 16px; padding: 22px; margin-bottom: 18px; text-align: center;
      border: 1px solid var(--border); }
    .verdict .lvl { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; }
    .verdict .sum { font-size: 15px; opacity: 0.92; margin-top: 4px; }
    .verdict .where { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.75; margin-bottom: 8px; }
    .verdict.GO { background: linear-gradient(160deg, rgba(16,185,129,0.22), rgba(16,185,129,0.06)); }
    .verdict.GO .lvl { color: #34d399; }
    .verdict.CAUTION { background: linear-gradient(160deg, rgba(245,158,11,0.22), rgba(245,158,11,0.06)); }
    .verdict.CAUTION .lvl { color: #fbbf24; }
    .verdict-NOGO { background: linear-gradient(160deg, rgba(239,68,68,0.22), rgba(239,68,68,0.06)); }
    .verdict-NOGO .lvl { color: #f87171; }
    .reasons { list-style: none; padding: 0; margin: 14px auto 0; max-width: 420px; text-align: left; }
    .reasons li { font-size: 13.5px; padding: 4px 0 4px 22px; position: relative; color: var(--text-secondary); }
    .reasons li::before { content: "•"; position: absolute; left: 6px; opacity: 0.6; }

    .alert { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 12px; }
    .alert .ev { font-weight: 700; color: #f87171; font-size: 14px; }
    .alert .hl { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .stat.hero { border-color: var(--accent); background: linear-gradient(160deg, rgba(0,160,226,0.16), rgba(0,160,226,0.03)); }
    .stat .k { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .stat .v { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .stat .sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 14px; }
    .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted);
      margin: 0 0 10px; }
    .fc { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .fc:last-child { border-bottom: none; }
    .fc .nm { font-weight: 600; font-size: 13.5px; }
    .fc .tx { font-size: 13px; color: var(--text-secondary); margin-top: 2px; line-height: 1.45; }

    .mapwrap, .camwrap { position: relative; border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); background: #06080f; }
    .mapwrap { height: 340px; }
    .camwrap { aspect-ratio: 16 / 9; }
    .mapwrap iframe, .camwrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .camtabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .camtabs button { padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 8px; }
    .camtabs button.active { background: var(--accent); color: #04121f; border-color: transparent; }
    .hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
    .hint a { color: var(--accent); text-decoration: none; }
    .linkcams { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; }
    .linkcams a { color: var(--accent); text-decoration: none; }
    .card .advice { font-size: 14px; line-height: 1.5; color: var(--text-primary); }
    .card.wr-bad { border-color: rgba(239,68,68,0.5); background: linear-gradient(160deg, rgba(239,68,68,0.13), transparent); }
    .card.wr-caution { border-color: rgba(245,158,11,0.5); background: linear-gradient(160deg, rgba(245,158,11,0.11), transparent); }
    .card.wr-ok { border-color: rgba(16,185,129,0.45); background: linear-gradient(160deg, rgba(16,185,129,0.10), transparent); }
    details.card > summary { cursor: pointer; font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); list-style: none; }
    details.card > summary::-webkit-details-marker { display: none; }
    details.card[open] > summary { margin-bottom: 8px; }
    .nsh { white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px;
      line-height: 1.45; color: var(--text-secondary); margin: 0; max-height: 360px; overflow: auto; }

    .meta { font-size: 11.5px; color: var(--text-muted); text-align: center; margin-top: 10px; }
    .meta button { background: none; border: 1px solid var(--border); color: var(--text-secondary);
      border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; margin-left: 8px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .err { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4); border-radius: 12px;
      padding: 14px; color: #f87171; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>⛵ Should I Boat?</h1>
      <span class="live">live</span>
    </div>
    <div class="spots" id="spots"></div>
    <div id="content"><div class="loading">Loading live Lake Erie conditions…</div></div>
    <div id="media"></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const content = document.getElementById("content");
    const spotsEl = document.getElementById("spots");
    const metaEl = document.getElementById("meta");
    const mediaEl = document.getElementById("media");
    let activeSpot = localStorage.getItem("boating.spot") || "sandusky";
    const SPOTS_BY_ID = {};

    // Verified-embeddable Lake Erie live cams. Nearest to the selected spot is
    // shown first; all are selectable.
    const CAMS = [
      { name: "Edgewater Beach · Cleveland", lat: 41.49, lon: -81.74, angelcam: "91yx8ek0ro" },
      { name: "Vermilion · Main St Beach", lat: 41.42, lon: -82.36, pixelcaster: "lesi/vermilion/mainstreet" },
      { name: "Cleveland Water Crib", lat: 41.54, lon: -81.71, ytChannel: "UCzmBlmDzPkaDGV72tSQ0yYw" },
      { name: "Cranberry Creek · Huron", lat: 41.39, lon: -82.55, yt: "zwlq7jscPc4" },
    ];
    // Cams whose sites block embedding — opened in a new tab so they're still here.
    const LINK_CAMS = [
      { name: "Mentor Harbor (MHYC)", url: "https://www.ipcamlive.com/mhyc" },
      { name: "Put-in-Bay", url: "https://putinbay.com/put-in-bay-webcams/" },
      { name: "Vermilion (click2stream)", url: "https://52d86ed501646.click2stream.com/" },
      { name: "Boat-launch cam", url: "http://boat-launch-kbgwjqzpppc.dynamic-m.com:8080/1118e736-acf4-47d7-a21d-80311f39f172.html" },
    ];
    const camSrc = (c) =>
      c.angelcam ? `https://v.angelcam.com/iframe?v=${c.angelcam}&autoplay=1`
        : c.pixelcaster ? `https://pixelcaster.com/live/${c.pixelcaster}/`
          : c.ytChannel ? `https://www.youtube.com/embed/live_stream?channel=${c.ytChannel}&autoplay=1&mute=1`
            : `https://www.youtube.com/embed/${c.yt}?autoplay=1&mute=1&rel=0`;
    const camLink = (c) =>
      c.angelcam ? `https://v.angelcam.com/${c.angelcam}`
        : c.pixelcaster ? `https://pixelcaster.com/live/${c.pixelcaster}/`
          : c.ytChannel ? `https://www.youtube.com/channel/${c.ytChannel}/live`
            : `https://www.youtube.com/watch?v=${c.yt}`;
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const dist = (la, lo, la2, lo2) => {
      const dx = (lo - lo2) * Math.cos(((la + la2) / 2) * Math.PI / 180);
      return Math.hypot(dx, la - la2);
    };

    const cls = (lvl) => (lvl === "NO-GO" ? "verdict-NOGO" : lvl);
    const fmt = (v, unit) => (v == null ? "—" : `${v}${unit || ""}`);

    async function loadSpots() {
      try {
        const r = await fetch("/marine/conditions?spots");
        const { spots } = await r.json();
        spots.forEach(s => { SPOTS_BY_ID[s.id] = { name: s.name, lat: s.lat, lon: s.lon }; });
        spotsEl.innerHTML = spots.map(s =>
          `<button data-id="${s.id}" class="${s.id === activeSpot ? "active" : ""}">${s.name}</button>`
        ).join("");
        spotsEl.querySelectorAll("button").forEach(b =>
          b.addEventListener("click", () => {
            activeSpot = b.dataset.id;
            localStorage.setItem("boating.spot", activeSpot);
            spotsEl.querySelectorAll("button").forEach(x => x.classList.toggle("active", x.dataset.id === activeSpot));
            updateMedia(activeSpot);
            load();
          })
        );
      } catch (e) { /* spot bar is non-critical */ }
    }

    // Weather map + live cams. Updated only when the spot changes (not on every
    // data refresh) so the map and video don't reload underneath you.
    function updateMedia(id) {
      const s = SPOTS_BY_ID[id];
      if (!s) return;
      mediaEl.dataset.spot = id;
      const windy = `https://embed.windy.com/embed2.html?lat=${s.lat}&lon=${s.lon}` +
        `&detailLat=${s.lat}&detailLon=${s.lon}&zoom=9&level=surface&overlay=wind&product=ecmwf` +
        `&menu=&message=true&marker=true&calendar=now&pressure=&type=map&location=coordinates` +
        `&detail=&metricWind=kt&metricTemp=%C2%B0F&radarRange=-1`;
      const cams = CAMS.slice().sort((a, b) => dist(s.lat, s.lon, a.lat, a.lon) - dist(s.lat, s.lon, b.lat, b.lon));
      const first = cams[0];
      mediaEl.innerHTML = `
        <div class="card">
          <h2>Weather map · ${s.name}</h2>
          <div class="mapwrap"><iframe title="Windy weather map" src="${windy}" loading="lazy" allow="fullscreen"></iframe></div>
          <div class="hint">Tap the layer buttons inside the map to switch wind · gusts · waves · rain · radar.</div>
        </div>
        <div class="card">
          <h2>Live cams · nearest to ${s.name}</h2>
          <div class="camtabs" id="camtabs">${cams.map((c, i) => `<button data-i="${i}" class="${i === 0 ? "active" : ""}">${c.name}</button>`).join("")}</div>
          <div class="camwrap"><iframe id="camframe" title="Live cam" src="${camSrc(first)}" loading="lazy" allow="autoplay; fullscreen" allowfullscreen></iframe></div>
          <div class="hint"><a id="camopen" href="${camLink(first)}" target="_blank" rel="noopener">Open this cam full ↗</a></div>
          <div class="linkcams">More cams (open in new tab): ${LINK_CAMS.map(c => `<a href="${c.url}" target="_blank" rel="noopener">${c.name} ↗</a>`).join("")}</div>
        </div>`;
      const tabs = document.getElementById("camtabs");
      tabs.querySelectorAll("button").forEach(btn =>
        btn.addEventListener("click", () => {
          const c = cams[+btn.dataset.i];
          document.getElementById("camframe").src = camSrc(c);
          document.getElementById("camopen").href = camLink(c);
          tabs.querySelectorAll("button").forEach(x => x.classList.toggle("active", x === btn));
        })
      );
    }

    async function load() {
      content.innerHTML = `<div class="loading">Loading live conditions…</div>`;
      try {
        const r = await fetch(`/marine/conditions?spot=${encodeURIComponent(activeSpot)}`);
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        const d = await r.json();
        render(d);
      } catch (e) {
        content.innerHTML = `<div class="err">Couldn't load conditions: ${e.message}. Try refreshing.</div>`;
      }
    }

    function render(d) {
      const b = d.buoy;
      const w = d.wind || {};
      const rec = d.recommendation;
      const alerts = (d.alerts || []).map(a =>
        `<div class="alert"><div class="ev">⚠ ${a.event || "Marine alert"}</div>
         <div class="hl">${a.headline || ""}</div></div>`).join("");

      // Wind + waves are the hero stats — always shown, buoy-observed or forecast.
      const wv = d.waves || {};
      const windSub = `${w.dir || ""}${w.gustKt ? " · gust " + w.gustKt + " kt" : ""}` +
        `${w.source === "forecast" ? " · forecast" : w.source === "buoy" ? " · observed" : ""}`;
      const waveSub = wv.periodSec ? wv.periodSec + "s period"
        : wv.source === "forecast" ? "forecast" : wv.source === "buoy" ? "observed" : "—";
      const stats = `
        <div class="grid">
          <div class="stat hero"><div class="k">Wind</div><div class="v">${fmt(w.speedKt, " kt")}</div>
            <div class="sub">${windSub.trim() || "—"}</div></div>
          <div class="stat"><div class="k">Waves</div><div class="v">${fmt(wv.ft, " ft")}</div>
            <div class="sub">${waveSub}</div></div>
          <div class="stat"><div class="k">Water</div><div class="v">${fmt(b ? b.waterTempF : null, "°")}</div>
            <div class="sub">${b && b.airTempF != null ? "air " + b.airTempF + "°" : ""}</div></div>
        </div>`;

      // Plain-language read on what the wind DIRECTION means for this shore.
      const wr = d.windRead;
      const windReadCard = wr ? `
        <div class="card wr-${wr.tone}">
          <h2>Wind read · out of the ${wr.dir}</h2>
          <div class="advice">${wr.advice}</div>
        </div>` : "";

      // Formal NWS Nearshore Marine Forecast (NSH) — the official text product.
      const nr = d.noaaReport;
      const noaaCard = nr && nr.text ? `
        <details class="card">
          <summary>📋 Formal NOAA Nearshore Forecast (NSH · ${nr.office})</summary>
          <pre class="nsh">${esc(nr.text)}</pre>
        </details>` : "";

      const noBuoy = b ? "" : `<div class="card" style="text-align:center;color:var(--text-muted)">
        No live buoy here — wind &amp; waves are from the NWS forecast. Verify before launch.</div>`;

      const marine = (d.marineForecast || []).length ? `
        <div class="card"><h2>Marine zone forecast · ${d.spot.zone}</h2>
        ${d.marineForecast.map(p => `<div class="fc"><div class="nm">${p.name}</div><div class="tx">${p.forecast || ""}</div></div>`).join("")}
        </div>` : "";

      const point = (d.pointForecast || []).length ? `
        <div class="card"><h2>Local weather</h2>
        ${d.pointForecast.map(p => `<div class="fc"><div class="nm">${p.name} · ${fmt(p.tempF, "°")}${p.precipPct ? " · " + p.precipPct + "% precip" : ""}</div>
          <div class="tx">${p.shortForecast || ""}. Wind ${p.wind || ""}.</div></div>`).join("")}
        </div>` : "";

      content.innerHTML = `
        <div class="verdict ${cls(rec.level)}">
          <div class="where">${d.spot.name}</div>
          <div class="lvl">${rec.level}</div>
          <div class="sum">${rec.summary}</div>
          <ul class="reasons">${rec.reasons.map(x => `<li>${x}</li>`).join("")}</ul>
        </div>
        ${alerts}
        ${stats}
        ${windReadCard}
        ${noBuoy}
        ${marine}
        ${point}
        ${noaaCard}`;

      // Ensure the map + cams are showing this spot (covers first paint if the
      // spot list hadn't loaded yet when the page opened).
      if (mediaEl.dataset.spot !== d.spot.id) {
        SPOTS_BY_ID[d.spot.id] = { name: d.spot.name, lat: d.spot.lat, lon: d.spot.lon };
        updateMedia(d.spot.id);
      }

      const obs = b ? `Buoy ${b.station} · ${b.ageMinutes != null ? b.ageMinutes + " min ago" : "latest"}` : "forecast only";
      metaEl.innerHTML = `Source: ${obs} · NWS &amp; NDBC (NOAA), Windy, YouTube. Updated ${new Date(d.updatedAt).toLocaleTimeString()}
        <button onclick="load()">↻ Refresh</button>`;
    }

    loadSpots().then(() => updateMedia(activeSpot));
    load();
  </script>
</body>
</html>
